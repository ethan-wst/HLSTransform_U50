[vivado]
impl.jobs=8
synth.jobs=8

[connectivity]
nk=forward:1:forward_1

# KV Cache — maximize read/write bandwidth
sp=forward_1.key_cache:HBM[0:3]
sp=forward_1.value_cache:HBM[4:7]

# Attention int8 weights
sp=forward_1.wq_weights:HBM[8:9]
sp=forward_1.wk_weights:HBM[10:11]
sp=forward_1.wv_weights:HBM[12:13]
sp=forward_1.wo_weights:HBM[14:15]

# Attention scales
sp=forward_1.wq_scales:HBM[16]
sp=forward_1.wk_scales:HBM[16]
sp=forward_1.wv_scales:HBM[16]
sp=forward_1.wo_scales:HBM[16]

# FFN int8 weights
sp=forward_1.w1_weights:HBM[17:18]
sp=forward_1.w2_weights:HBM[19:20]
sp=forward_1.w3_weights:HBM[21:22]

# FFN scales
sp=forward_1.w1_scales:HBM[23]
sp=forward_1.w2_scales:HBM[23]
sp=forward_1.w3_scales:HBM[23]

# Embedding table
sp=forward_1.token_embedding_table:HBM[24:25]

# Classifier weights
sp=forward_1.wcls_weights:HBM[26:27]
sp=forward_1.wcls_scales:HBM[28]

# RMS norm weights
sp=forward_1.rms_att_weight:HBM[29]
sp=forward_1.rms_ffn_weight:HBM[29]
sp=forward_1.rms_final_weight:HBM[29]

# Output logits
sp=forward_1.out:HBM[30]
